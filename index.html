<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORYTELLIC — Creative Director & Cinematographer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow+Condensed:wght@300;400;500;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --deep: #0f0f0e;
    --surface: #151513;
    --border: #2a2a26;
    --muted: #4a4a44;
    --mid: #7a7a70;
    --text: #c8c8bc;
    --light: #e8e8dc;
    --white: #f2f2ea;
    --gold: #c9a96e;
    --gold-dim: #8a7248;
    --accent: #e8c882;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(201, 169, 110, 0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.12s ease;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 2rem 4rem;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--white);
    text-transform: uppercase;
    text-decoration: none;
  }
  .nav-links {
    display: flex; gap: 3rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }

  /* Hero */
  #home {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: var(--black);
    position: relative;
  }
  .hero-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.5rem;
    color: var(--white);
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="#home" class="nav-logo">STORYTELLIC</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#portfolio">Work</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="home">
  <div>
    <h1 class="hero-headline">STORYTELLIC</h1>
    <p style="color: var(--gold); font-size: 1.2rem; margin-top: 1rem;">Creative Director & Cinematographer</p>
    <p style="max-width: 600px; margin: 2rem auto; color: var(--mid);">Crafting cinematic stories that move hearts and minds.</p>
  </div>
</section>

<footer style="text-align:center; padding: 3rem; color: var(--muted); background: var(--deep);">
  <p>© 2026 STORYTELLIC — Creative Director & Cinematographer</p>
  <p><a href="mailto:hello@storytellic.com" style="color:var(--gold);">hello@storytellic.com</a></p>
</footer>

</body>
</html>
